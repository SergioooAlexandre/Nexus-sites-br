<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="nexus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#00C8FF" />
    </linearGradient>
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Logo Icon: Futuristic overlapping connection lines forming an N-like structure -->
  <g transform="translate(10, 5)">
    <!-- Back connection glow line -->
    <path d="M 5,30 L 20,10 L 35,30" stroke="rgba(10, 132, 255, 0.3)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#nexus-glow)" />
    <!-- Main connection structure -->
    <path d="M 5,35 L 5,15 C 5,10 15,10 15,15 L 15,35 C 15,40 25,40 25,35 L 25,15" stroke="url(#nexus-grad)" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <!-- Floating digital node -->
    <circle cx="25" cy="15" r="3" fill="#ffffff" filter="url(#nexus-glow)" />
    <circle cx="5" cy="35" r="2" fill="#00C8FF" />
  </g>
  <!-- Logo Text -->
  <text x="50" y="32" font-family="'Outfit', sans-serif" font-weight="900" font-size="20" fill="#ffffff" letter-spacing="0.5">NEXUS</text>
  <text x="123" y="32" font-family="'Outfit', sans-serif" font-weight="400" font-size="20" fill="#0A84FF" letter-spacing="0.5">SITES</text>
  <rect x="180" y="16" width="16" height="16" rx="3" fill="#0A84FF" />
  <text x="182" y="28" font-family="'Outfit', sans-serif" font-weight="900" font-size="9" fill="#ffffff">BR</text>
</svg>
