<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <defs>
    <linearGradient id="nexus-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF" />
      <stop offset="100%" stop-color="#00C8FF" />
    </linearGradient>
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="50" height="50" rx="12" fill="#000000" />
  <rect width="46" height="46" x="2" y="2" rx="10" fill="#0A0A0B" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <g transform="translate(10, 5)">
    <path d="M 5,30 L 20,10 L 35,30" stroke="rgba(10, 132, 255, 0.3)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#nexus-glow)" />
    <path d="M 5,35 L 5,15 C 5,10 15,10 15,15 L 15,35 C 15,40 25,40 25,35 L 25,15" stroke="url(#nexus-grad)" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <circle cx="25" cy="15" r="3" fill="#ffffff" filter="url(#nexus-glow)" />
    <circle cx="5" cy="35" r="2" fill="#00C8FF" />
  </g>
</svg>